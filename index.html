<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#b89242"><title>The Key Collective OS</title>
<link rel="manifest" href="manifest.webmanifest"><link rel="icon" href="assets/logo.png">
<link rel="stylesheet" href="css/tokens.css"><link rel="stylesheet" href="css/app.css">
</head><body>
<div id="appShell" class="app-shell">
  <div id="menuScrim" class="menu-scrim" aria-hidden="true"></div>
  <aside id="sidebar" class="sidebar" aria-label="Primary navigation">
    <div class="brand"><img src="assets/logo.png" alt="The Key Collective logo"><div><small>PERSONAL EDITION</small><strong>The Key<br>Collective OS</strong></div></div>
    <blockquote>“Unlock the life you’re building, one intentional choice at a time.”</blockquote>
    <nav id="nav"></nav>
  </aside>
  <main>
    <header class="topbar">
      <button id="menuButton" class="icon-button mobile-only" aria-label="Open menu">☰</button>
      <button id="backButton" class="icon-button" aria-label="Go back">←</button>
      <button id="homeButton" class="icon-button" aria-label="Go to dashboard">⌂</button>
      <span id="breadcrumb">Dashboard</span><span class="spacer"></span>
      <button id="themeButton" class="icon-button" aria-label="Toggle theme">◐</button>
      <img class="avatar" src="assets/profile.jpg" alt="Key profile photo">
    </header>
    <div id="page" class="page" tabindex="-1"></div>
  </main>
</div>
<div id="toast" class="toast" role="status"></div>
<script type="module" src="js/app.js"></script>
</body></html>
